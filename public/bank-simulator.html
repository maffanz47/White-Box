<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhiteBox — Bank Transfer Simulator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            color: #f9fafb;
        }
        .card {
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            border-top: 3px solid #10b981;
            padding: 1.75rem;
            border-radius: 14px;
            width: 100%;
            max-width: 480px;
        }
        .header { margin-bottom: 1.25rem; }
        .header h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; color: #f9fafb; }
        .header p { font-size: 0.8rem; color: #6b7280; }
        .tag {
            display: inline-block;
            font-size: 0.65rem;
            font-family: monospace;
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            background: rgba(16,185,129,0.1);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.2);
            margin-bottom: 0.75rem;
            letter-spacing: 0.05em;
        }
        .form-group { margin-bottom: 0.875rem; }
        label { display: block; font-size: 0.72rem; font-weight: 600; margin-bottom: 0.35rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
        input, select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 0.875rem;
            color: #f9fafb;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: #10b981; }
        select option { background: #1f2937; color: #f9fafb; }
        .amount-wrap { position: relative; }
        .amount-wrap .prefix { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: #6b7280; font-size: 0.875rem; }
        .amount-wrap input { padding-left: 2.25rem; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        button {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 1rem;
            letter-spacing: 0.025em;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #result {
            margin-top: 1rem;
            padding: 0.875rem;
            border-radius: 8px;
            font-size: 0.8rem;
            display: none;
        }
        .success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; }
        .error   { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.25);  color: #fca5a5; }
        #result strong { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; }
        #result .hash { font-family: monospace; font-size: 0.7rem; word-break: break-all; color: #10b981; margin-top: 0.5rem; }
        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 1.25rem 0; }
        .loading-ngo { color: #6b7280; font-size: 0.8rem; padding: 0.6rem 0.75rem; }
        a.live-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.75rem; color: #6b7280; text-decoration: none; }
        a.live-link:hover { color: #10b981; }
    </style>
</head>
<body>

<div class="card">
    <div class="tag">RAAST / 1LINK BANK SIMULATOR</div>
    <div class="header">
        <h2>WhiteBox — Bank Transfer Simulator</h2>
        <p>Simulates a bank webhook sending a donation directly to the WhiteBox platform.</p>
    </div>

    <div class="form-group">
        <label>Donor Name</label>
        <input type="text" id="donor_name" value="Hackathon Judge" />
    </div>

    <div class="grid2">
        <div class="form-group">
            <label>Amount (PKR)</label>
            <div class="amount-wrap">
                <span class="prefix">Rs</span>
                <input type="number" id="amount" value="50000" min="1" />
            </div>
        </div>
        <div class="form-group">
            <label>Channel</label>
            <select id="channel">
                <option value="raast">Raast P2M</option>
                <option value="1link">1Link</option>
                <option value="bank_transfer">Bank Transfer</option>
                <option value="manual">Manual</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Destination NGO</label>
        <select id="ngo_id">
            <option value="">Loading NGOs...</option>
        </select>
    </div>

    <div class="form-group">
        <label>Sector</label>
        <select id="sector">
            <option value="health">Health</option>
            <option value="education">Education</option>
            <option value="disaster_relief">Disaster Relief</option>
            <option value="infrastructure">Infrastructure</option>
            <option value="food_security">Food Security</option>
        </select>
    </div>

    <button id="sendBtn" onclick="sendWebhook()">Send Transfer Webhook</button>

    <div id="result"></div>

    <hr class="divider">
    <a href="https://white-box-iota.vercel.app/dashboard" target="_blank" class="live-link">View Live Dashboard &rarr;</a>
    <a href="https://white-box-iota.vercel.app/audit" target="_blank" class="live-link">View Audit Chain &rarr;</a>
</div>

<script>
    const BASE_URL = "https://white-box-iota.vercel.app";

    // Beeceptor proxy URL — routes to Vercel just like a real bank would
    const BEECEPTOR_URL = "https://whitebox-test-123456.free.beeceptor.com";

    // Load NGOs from the live platform
    async function loadNGOs() {
        try {
            const res = await fetch(`${BASE_URL}/api/ngos`);
            if (!res.ok) throw new Error("Could not load NGOs");
            const ngos = await res.json();
            const sel = document.getElementById('ngo_id');
            sel.innerHTML = '';

            // Add unassigned option
            const unassigned = document.createElement('option');
            unassigned.value = '';
            unassigned.textContent = '— General Pool (no specific NGO) —';
            sel.appendChild(unassigned);

            ngos.forEach(ngo => {
                const opt = document.createElement('option');
                opt.value = ngo.id;
                opt.textContent = `${ngo.name} (${ngo.sector.replace('_', ' ')})`;
                // Auto-select matching sector when sector changes
                opt.dataset.sector = ngo.sector;
                sel.appendChild(opt);
            });
        } catch (e) {
            document.getElementById('ngo_id').innerHTML = '<option value="">Failed to load — check connection</option>';
        }
    }

    // When NGO is selected, auto-set the sector dropdown
    document.addEventListener('DOMContentLoaded', () => {
        loadNGOs();
        document.getElementById('ngo_id').addEventListener('change', function() {
            const selectedOpt = this.options[this.selectedIndex];
            const sector = selectedOpt.dataset.sector;
            if (sector) {
                document.getElementById('sector').value = sector;
            }
        });
    });

    async function sendWebhook() {
        const btn = document.getElementById('sendBtn');
        const resultDiv = document.getElementById('result');
        
        btn.textContent = "Sending...";
        btn.disabled = true;
        resultDiv.style.display = 'none';

        const amountPKR = Number(document.getElementById('amount').value);
        const amountPaisa = Math.round(amountPKR * 100);
        const ngoId = document.getElementById('ngo_id').value;

        const payload = {
            donor_name: document.getElementById('donor_name').value || 'Anonymous',
            donor_id: "42201-" + Math.floor(Math.random() * 9000000 + 1000000) + "-8",
            amount: amountPaisa,
            sector: document.getElementById('sector').value,
            channel: document.getElementById('channel').value,
            tx_ref: "SIM-" + Date.now(),
        };

        // Only include ngo_id if one was selected
        if (ngoId) payload.ngo_id = ngoId;

        try {
            // Route through Beeceptor (intermediary proxy) — mirrors real bank webhook architecture
            let response;
            let routedVia = 'Beeceptor Proxy';
            try {
                response = await fetch(`${BEECEPTOR_URL}/api/webhook/donation`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (proxyErr) {
                // Fallback to direct Vercel API if Beeceptor is unavailable
                routedVia = 'Direct API (Beeceptor unavailable)';
                response = await fetch(`${BASE_URL}/api/webhook/donation`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            }

            const data = await response.json();
            resultDiv.style.display = 'block';

            if (response.ok) {
                resultDiv.className = 'success';
                resultDiv.innerHTML = `
                    <strong>Transfer Successful — Donation Recorded</strong>
                    Rs ${amountPKR.toLocaleString()} sent to ${document.getElementById('ngo_id').options[document.getElementById('ngo_id').selectedIndex].textContent}.<br>
                    Sector: <b>${payload.sector}</b> &nbsp;|&nbsp; Channel: <b>${payload.channel}</b><br>
                    Routed via: <b style="color:#10b981">${routedVia}</b><br>
                    Donation ID: <span style="font-family:monospace;font-size:0.7rem">${data.donation_id || 'N/A'}</span>
                    <div class="hash">SHA-256: ${data.audit_hash || 'N/A'}</div>
                `;
            } else {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<strong>Transfer Failed</strong>${data.error || 'Unknown error'}<br><small>${data.detail || ''}</small>`;
            }
        } catch(e) {
            resultDiv.style.display = 'block';
            resultDiv.className = 'error';
            resultDiv.innerHTML = `<strong>Network Error</strong>Could not reach the WhiteBox API. Check your internet connection.`;
        }

        btn.textContent = "Send Transfer Webhook";
        btn.disabled = false;
    }
</script>

</body>
</html>
